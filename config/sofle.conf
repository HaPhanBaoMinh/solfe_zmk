CONFIG_ZMK_DISPLAY=y

# Không dùng pin (cell) — chỉ USB cấp điện: tắt báo pin trong firmware
CONFIG_ZMK_BATTERY_REPORTING=n

# OLED: refresh UI nhanh hơn mặc định (10 ms) — cảm giác “sống” hơn
CONFIG_ZMK_DISPLAY_TICK_PERIOD_MS=8

# Giao diện: thử bật nếu muốn đảo sáng/tối (SSD1306 + theme mono)
# CONFIG_ZMK_DISPLAY_INVERT=y

CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

CONFIG_ZMK_SLEEP=y 
CONFIG_BT_DEVICE_NAME="Sofle"
CONFIG_ZMK_KEYBOARD_NAME="Sofle"

CONFIG_ZMK_RGB_UNDERGLOW=y
